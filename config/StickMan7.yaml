behaviors:
  StickMan:
    trainer_type: ppo
    hyperparameters:
      batch_size: 2560
      buffer_size: 102400
      learning_rate: 1.0e-5
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.99
      num_epoch: 3
      learning_rate_schedule: linear
    network_settings:
      normalize: true
      hidden_units: 512
      num_layers: 3
      normalize: true
    reward_signals:
      curiosity:
        strength: 1.0
        gamma: 0.99
        encoding_size: 128
        learning_rate: 3.0e-4
      extrinsic:
        gamma: 0.99
        strength: 1.0
    max_steps: 50000000
    time_horizon: 64
    summary_freq: 15000
    threaded: true
    