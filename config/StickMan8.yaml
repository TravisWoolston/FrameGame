behaviors:
  StickMan:
    trainer_type: ppo
    hyperparameters:
      batch_size: 1024  # Reduced from 5000
      buffer_size: 20480  # Reduced from 50000
      learning_rate: 3.0e-4  # Increased slightly from 1.0e-5
      beta: 5.0e-4
      epsilon: 0.2
      lambd: 0.95  # Adjusted from 0.99
      num_epoch: 10  # Reduced from 4
      learning_rate_schedule: constant  # Changed from linear for more stable learning
    network_settings:
      normalize: true
      hidden_units: 256  # Reduced from 512
      num_layers: 2  # Reduced from 3
    reward_signals:
      curiosity:
        gamma: 0.99
        strength: 1.0
        network_settings:
          hidden_units: 128
          num_layers: 2
          vis_encode_type: simple
        learning_rate: 0.0003
      extrinsic:
        gamma: 0.99
    max_steps: 50000000
    time_horizon: 64
    summary_freq: 50000  # Increased from 20000 to reduce logging overhead
    keep_checkpoints: 5  # Reduced from 100 to save memory
    threaded: true



